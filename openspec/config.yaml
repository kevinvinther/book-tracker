schema: spec-driven

context: |
  **Domain**: Personal book diary app. Physical copies as first-class entities.
  **Data store**: Markdown files + YAML frontmatter (Obsidian-compatible).
  **Stack**: React + Vite + TypeScript + Tailwind + shadcn/ui (frontend). Node.js + Express + TypeScript (backend). No database.
  **Key conventions**:
  - Frontmatter is canonical. Markdown bodies are auto-generated renders, never parsed as data input.
  - Forward `[[wikilinks]]` only. Reverse navigation uses Obsidian backlinks or the in-memory index.
  - Slugs are immutable once created.
  - Atomic writes: always write to temp file and rename, never write directly.
  - Re-read before write: before any PATCH, re-read the target file from disk and merge fields the app isn't touching.
  - No empty optional fields: omit keys entirely when they have no value.
  - Genres are normalized: lowercase, trimmed, spaces → hyphens.
  - Note filenames are timestamps: `YYYY-MM-DD-HHMMSS.md` (no colons).
  **Server entry point**: `server/src/index.ts` — registers entity routes as factory functions `createXxxRouter(index, libraryPath)`.
  **File I/O primitives**: `server/src/lib/io.ts` — `readFile`, `writeFile`, `deleteFile`, `listFiles`.
  **In-memory index**: `server/src/lib/index.ts` — `Index` class loaded at startup from all markdown files.

