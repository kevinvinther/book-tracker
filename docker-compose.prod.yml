services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: runtime
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    # Mount only the library data directory (no source). Point the left side at
    # the operator's library; BOOKTRACKER_LIBRARY_PATH (in .env) must match the
    # in-container path on the right.
    volumes:
      - ~/book-tracker-data/:/book-tracker-data
    # Run as the host user so files in the mounted data directory keep correct
    # ownership.
    user: "1000:1000"
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://localhost:3001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
